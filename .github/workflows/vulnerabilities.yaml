name: Vulnerability Scan Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*

jobs:
  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Clean Up Actions Tools Cache
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install Go Releaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make
          sudo apt-get install -y build-essential

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1

      - name: Build All Platforms
        run: make build-all

      - name: Run Vulnerability Scans
        run: make vulns

      - name: Display Vulnerability Reports
        if: always()
        run: |
          echo "::group::govulncheck (vulncheck.out)"
          cat vulncheck.out || echo "vulncheck.out not found"
          echo "::endgroup::"
          echo "::group::trivy rootfs (trivy.out)"
          cat trivy.out || echo "trivy.out not found"
          echo "::endgroup::"

      - name: Upload Vulnerability Reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: vulnerability-reports
          path: |
            vulncheck.out
            trivy.out
