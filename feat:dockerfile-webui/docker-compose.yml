version: '3.8'

services:
  hauler-ui:
    build: .
    image: hauler-ui:v3.3.5
    container_name: hauler-ui
    ports:
      - "8080:8080"
      - "5000:5000"
      - "8081:8081"
    volumes:
      - ./data/store:/data/store
      - ./data/manifests:/data/manifests
      - ./data/hauls:/data/hauls
      - ./data/config:/data/config
      - ./data/extracted:/data/extracted
    restart: unless-stopped
    environment:
      - HAULER_STORE=/data/store
      # Set to enable API key authentication (recommended for non-localhost deployments)
      # - HAULER_UI_API_KEY=your-secret-key-here
